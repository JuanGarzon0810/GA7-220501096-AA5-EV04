<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARBIERE 11 - Gestión de Servicios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="layout">
        <aside id="sidebar"></aside>

        <main class="contenido-principal">
            <header id="topbar"></header>

            <div class="pagina-contenido">
                <div class="encabezado">
                    <div>
                        <h2>Gestión de Servicios</h2>
                        <p class="descripcion-topbar">Configura los servicios de la barbería</p>
                    </div>
                    <button class="btn btn-dorado" id="btnNuevoServicio">+ Nuevo Servicio</button>
                </div>

                <div class="grid-tarjetas-servicios" id="grillaServicios">
                    <p class="sin-datos">Cargando servicios...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para crear / editar servicio (RF07 / RF08) -->
    <div class="overlay-modal" id="overlayModal">
        <div class="modal">
            <h2 id="tituloModal">Nuevo Servicio</h2>

            <form id="formServicio">
                <input type="hidden" id="servicioId">

                <div class="campo">
                    <label for="inputNombre">Nombre del servicio</label>
                    <input type="text" id="inputNombre" placeholder="Ej: Peluqueada" required>
                </div>

                <div class="campo">
                    <label for="inputPrecio">Precio (COP)</label>
                    <input type="number" id="inputPrecio" min="0" step="500" placeholder="Ej: 25000" required>
                </div>

                <div class="campo">
                    <label for="inputDuracion">Duración (minutos)</label>
                    <input type="number" id="inputDuracion" min="1" placeholder="Ej: 30" required>
                </div>

                <div class="campo">
                    <label for="inputDescripcion">Descripción (opcional)</label>
                    <input type="text" id="inputDescripcion" placeholder="Ej: Corte de cabello clásico">
                </div>

                <p class="mensaje-error" id="mensajeErrorForm"></p>

                <div class="acciones-modal">
                    <button type="button" class="btn btn-secundario" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn btn-dorado">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="notificacion" id="notificacion"></div>

    <script src="js/auth.js"></script>
    <script>const PAGINA_ACTIVA = 'servicios';</script>
    <script src="js/sidebar.js"></script>
    <script src="js/servicios.js"></script>
</body>
</html>
