<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARBIERE 11 - Reportes & Análisis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <div class="layout">
        <aside id="sidebar"></aside>

        <main class="contenido-principal">

                        <p class="descripcion-topbar">Estadísticas y métricas del negocio</p>

                </div>

                <div class="grid-paneles">
                    <div class="panel">
                        <h3>Ingresos por Mes (RF22)</h3>
                        <div id="graficaIngresosPorMes">

                        </div>
                    </div>

                        <h3>Citas por Estado</h3>
                        <div id="graficaCitasPorEstado">
                            <p class="sin-datos">Cargando...</p>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h3>Servicios Más Vendidos (RF23)</h3>
                    <div id="tablaServiciosVendidos">
                        <p class="sin-datos">Cargando...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>const PAGINA_ACTIVA = 'reportes';</script>
