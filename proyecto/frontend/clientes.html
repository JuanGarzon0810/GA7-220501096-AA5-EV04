<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARBIERE 11 - Gestión de Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="layout">
        <aside id="sidebar"></aside>

        <main class="contenido-principal">
            <header id="topbar"></header>

            <div class="pagina-contenido">
                <div class="encabezado">
                    <div>
                        <h2>Gestión de Clientes</h2>
                        <p class="descripcion-topbar">Administra la base de clientes de la barbería</p>
                    </div>
                    <button class="btn btn-dorado" id="btnNuevoCliente">+ Nuevo Cliente</button>
                </div>

                <!-- Buscador (RF06) -->
                <input
                    type="text"
                    id="inputBuscar"
                    class="buscador"
                    placeholder="Buscar por nombre o teléfono..."
                >

                <!-- Tabla de clientes -->
                <table class="tabla-clientes">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Correo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaClientes">
                        <tr>
                            <td colspan="5" class="sin-datos">Cargando clientes...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal para crear / editar cliente (RF03 / RF04) -->
    <div class="overlay-modal" id="overlayModal">
        <div class="modal">
            <h2 id="tituloModal">Nuevo Cliente</h2>

            <form id="formCliente">
                <input type="hidden" id="clienteId">

                <div class="campo">
                    <label for="inputNombre">Nombre completo</label>
                    <input type="text" id="inputNombre" placeholder="Ej: Carlos Ramirez" required>
                </div>

                <div class="campo">
                    <label for="inputTelefono">Teléfono</label>
                    <input type="text" id="inputTelefono" placeholder="Ej: 3001234567" required>
                </div>

                <div class="campo">
                    <label for="inputCorreo">Correo (opcional)</label>
                    <input type="email" id="inputCorreo" placeholder="Ej: cliente@correo.com">
                </div>

                <p class="mensaje-error" id="mensajeErrorForm"></p>

                <div class="acciones-modal">
                    <button type="button" class="btn btn-secundario" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn btn-dorado">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notificacion de exito / error -->
    <div class="notificacion" id="notificacion"></div>

    <script src="js/auth.js"></script>
    <script>const PAGINA_ACTIVA = 'clientes';</script>
    <script src="js/sidebar.js"></script>
    <script src="js/clientes.js"></script>
</body>
</html>
