<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARBIERE 11 - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="pagina-login">

    <div class="tarjeta-login">
        <div class="logo-login">
            <h1>B<span class="acento-dorado">11</span></h1>
            <p class="subtitulo">SISTEMA DE GESTIÓN PREMIUM</p>
            <p class="nombre-marca">BARBIERE 11</p>
        </div>

        <form id="formLogin">
            <div class="campo">
                <label for="inputCorreo">Usuario (correo)</label>
                <input type="email" id="inputCorreo" placeholder="admin@barbiere11.com" required autofocus>
            </div>

            <div class="campo">
                <label for="inputPassword">Contraseña</label>
                <input type="password" id="inputPassword" placeholder="••••••••" required>
            </div>

            <p class="mensaje-error" id="mensajeErrorLogin"></p>

            <button type="submit" class="btn btn-dorado btn-ancho" id="btnIngresar">
                Ingresar al Sistema →
            </button>
        </form>

        <p class="pie-login">© 2026 BARBIERE 11 — Todos los derechos reservados</p>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
